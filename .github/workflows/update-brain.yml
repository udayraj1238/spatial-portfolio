name: Update APEX AI Brain

on:
  schedule:
    # 18:30 UTC = 12:00 AM IST — runs once every night
    - cron: '30 18 * * *'

  workflow_dispatch: # Lets you trigger it manually from the GitHub Actions tab

  push:
    paths:
      - 'resume_updated.pdf'   # re-run immediately if you upload a new resume
      - 'linkedin_data.txt'    # re-run immediately if you update this file
      - 'update_apex_brain.py' # re-run immediately if you edit the script itself

jobs:
  update-brain:
    runs-on: ubuntu-latest

    # Required so the workflow's auto-generated token is allowed to push commits
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN is enough — this only reads YOUR OWN public
          # repos and writes to THIS repo. No personal access token needed,
          # no extra secret to create, completely free.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber

      - name: Run APEX Brain Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_apex_brain.py

      - name: Commit and push if anything changed
        run: |
          git config --global user.name "APEX Brain Bot"
          git config --global user.email "actions@github.com"

          git add public/resume_data.txt src/app/api/chat/route.ts

          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore(apex): nightly auto-sync of GitHub repos + resume"
            git push
            echo "Changes pushed — Vercel will auto-deploy within a minute."
          else
            echo "No changes detected — nothing to commit."
          fi
