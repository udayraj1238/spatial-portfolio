name: Update APEX AI Brain

on:
  schedule:
    # Runs at 18:30 UTC every day (12:00 AM IST)
    - cron: '30 18 * * *'
  
  workflow_dispatch: # Allows manual trigger from GitHub UI
  
  push:
    paths:
      - 'linkedin_data.txt'
      - 'resume_updated.pdf'
      - 'update_resume_ai.py'

jobs:
  update-brain:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.APEX_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber PyMuPDF
          
      - name: Run Deep Code Scan & Brain Update
        env:
          GITHUB_TOKEN: ${{ secrets.APEX_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python update_resume_ai.py
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "APEX Automator"
          git config --global user.email "apex-bot@udayraj.portfolio"
          
          # Only commit if there are changes (correct path: public/resume_data.txt)
          if [[ -n "$(git status --porcelain public/resume_data.txt)" ]]; then
            git add public/resume_data.txt
            git commit -m "chore(ai): auto-update APEX knowledge base"
            git push
          else
            echo "No changes in resume_data.txt detected. Skipping commit."
          fi
